spring:
  application:
    version: 1.0.0-prod
  flyway:
    baseline-version: 1
    baseline-on-migrate: true

app:
  cors:
    allowed-origins:
      - "https://solitar.link"
  rate-limiter:
    capacity: 1000
    refill-period-in-seconds: 3600

management:
  server:
    port: 8081
  endpoints:
    web:
      base-path: /
      exposure:
        include: "*"
